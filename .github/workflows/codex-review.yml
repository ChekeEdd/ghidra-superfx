name: Codex PR review

# We use `pull_request_target` (not `pull_request`) so that PRs opened
# from forked repositories also get access to the OPENAI_API_KEY
# secret. With plain `pull_request`, GitHub deliberately strips
# secrets for fork-sourced PRs — fine for repos where contributors
# all have write access, but for a public solo-maintained repo the
# main expected PR channel is forks.
#
# Safety: this workflow does NOT execute any PR code. It checks out
# the PR's *merge ref* (the post-merge state as GitHub computes it),
# fetches the diff, and hands it to openai/codex-action, which only
# reads code. No build, no install, no script execution. The workflow
# YAML itself is read from the BASE branch (main), so a malicious PR
# cannot modify this file to leak the secret — workflow edits only
# take effect after merge.
on:
  pull_request_target:
    types: [opened, synchronize, reopened]

jobs:
  codex:
    name: Run Codex review
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      final_message: ${{ steps.run_codex.outputs.final-message }}
    steps:
      - name: Verify OPENAI_API_KEY secret is set
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "::error::OPENAI_API_KEY secret is not set for this repository."
            echo "::error::Run: gh secret set OPENAI_API_KEY -R ${{ github.repository }}"
            echo "::error::Without it, openai/codex-action's proxy server starts unauthenticated,"
            echo "::error::dies silently, and the action loops on a missing server-info file"
            echo "::error::until the 6-hour job timeout. Failing fast instead."
            exit 1
          fi
          echo "OPENAI_API_KEY is set (length: ${#OPENAI_API_KEY} chars). Proceeding."

      - name: Checkout PR merge commit
        uses: actions/checkout@v5
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge

      - name: Pre-fetch base and head refs
        env:
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          git fetch --no-tags origin \
            "$PR_BASE_REF" \
            "+refs/pull/$PR_NUMBER/head"

      - name: Run Codex
        id: run_codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt: |
            This is PR #${{ github.event.pull_request.number }} for
            ${{ github.repository }} — a Ghidra SLEIGH processor module
            for the Nintendo SuperFX (GSU-1 / GSU-2) co-processor.
            See README.md and the header comment in
            data/languages/superfx.slaspec for the design rationale.

            Review ONLY the changes introduced by this PR (diff against
            the base branch). Focus on:

              - SLEIGH syntax correctness: token definitions, context
                register propagation via globalset, delayslot directives,
                attach-names tables, address-space declarations.
              - Instruction encoding accuracy against the bsnes ground
                truth referenced throughout superfx.slaspec. The module
                claims 100% byte-boundary / 100% mnemonic-family
                agreement on 64 KB of validated Star Fox GSU code —
                flag any change that could regress that guarantee.
              - ALT1 / ALT2 / ALT3 prefix-state handling and its
                interaction with branch delay slots. The current model
                propagates altCtx via globalset(inst_next, ...);
                deviations need strong justification.
              - Consistency of license / attribution claims. bsnes is
                GPLv3+, Ghidra slaspecs are Apache-2.0, this repo is
                BSD-3-Clause. None of these should be misstated or
                downgraded; see CHANGELOG.md v0.3.2 for the audit
                history.
              - Drift from the v0.4 roadmap (SREG/DREG full prefix
                modelling) — if the PR touches WITH/TO/FROM, it should
                either implement the prefix semantics fully or leave
                them alone.
              - Standard hygiene: typos in mnemonics, copy-paste errors
                between similar opcodes, missing delayslot(1) on new
                control-flow constructors, missing globalset on new
                ALT-state constructors.

            Format your findings as numbered comments tagged P1 (must
            fix), P2 (should fix), P3 (nice to have), with file paths
            and line numbers. If the PR looks clean, say so explicitly
            in one sentence.

  post_feedback:
    name: Post Codex feedback as PR comment
    runs-on: ubuntu-latest
    needs: codex
    if: needs.codex.outputs.final_message != ''
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Comment on PR
        uses: actions/github-script@v7
        env:
          CODEX_FINAL_MESSAGE: ${{ needs.codex.outputs.final_message }}
        with:
          github-token: ${{ github.token }}
          script: |
            const body = [
              '### Codex automated review',
              '',
              process.env.CODEX_FINAL_MESSAGE,
              '',
              '---',
              '_Posted by `.github/workflows/codex-review.yml` (openai/codex-action@v1). ' +
              'This is an automated read-only review; the maintainer still does the final pass._',
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body,
            });
